    .timeline-item {
      background: #fff;

    @keyframes placeHolderShimmer{
      0%{

        background: #f6f7f8;
        background: linear-gradient(to right, #eeeeee 8%, #dddddd 18%, #eeeeee 33%);
        background-size: 800px 104px;
        height: 710pt;
        position: relative;
    }
    .background-masker {
    background: white;
    height: 1em;
    float: right;
    clear: both;
